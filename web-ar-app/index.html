<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <title>AR Tunnel Experience</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>

  <!-- MARCO: Loading Screen -->
  <div id="loading-screen">
    <div class="loading-spinner"></div>
    <div class="loading-text">Initializing AR</div>
    <div class="loading-sub">Loading models &amp; scene…</div>
  </div>

  <!-- MARCO: Three.js container (canvas injectato qui) -->
  <div id="ar-container"></div>

  <!-- SANDRO: Overlay SVG per Motion Graphics sopra la mano -->
  <div id="svg-overlay"></div>

  <!-- SANDRO: Hand tracking status -->
  <div id="hand-status">
    <div class="status-dot" id="hand-dot"></div>
    <span class="status-text" id="hand-status-text">No hand</span>
  </div>

  <!-- Fallback message (se WebXR non disponibile) -->
  <div id="fallback-message">
    <span class="fallback-icon">📱</span>
    <span class="fallback-text">WebXR AR requires Safari on iOS.<br>Running in simulation mode — raise your hand for data overlay.</span>
  </div>

  <!-- QR hint per debug -->
  <div id="qr-hint">
    📱 Scan QR on the ground to enter AR tunnel
  </div>

  <!-- ============================================ -->
  <!-- SCRIPTS                                       -->
  <!-- ============================================ -->

  <!-- Three.js (Marco) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

  <!-- MediaPipe Vision Tasks (Sandro) — UMD bundle for global window.* access -->
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.18/vision_bundle.min.js"></script>

  <!-- Marco's modules -->
  <script src="js/marco/scene.js"></script>
  <script src="js/marco/butterflies.js"></script>

  <!-- Sandro's modules -->
  <script src="js/sandrx/handTracking.js"></script>
  <script src="js/sandrx/svgOverlay.js"></script>

  <!-- App controller (collega Marco ↔ Sandro) -->
  <script src="js/app.js"></script>

</body>
</html>
