<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" yes" />
  <title>AR Tunnel Experience</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>

  <!-- MARCO: Three.js container -->
  <div id="ar-container"></div>

  <!-- SANDRO: Overlay SVG Motion Graphics -->
  <div id="svg-overlay"></div>

  <!-- SANDRO: Hand tracking status -->
  <div id="hand-status">
    <div class="status-dot" id="hand-dot"></div>
    <span class="status-text" id="hand-status-text">No hand</span>
  </div>

  <!-- Fallback message -->
  <div id="fallback-message">
    <span class="fallback-icon">📱</span>
    <span class="fallback-text">WebXR AR requires Safari on iOS.<br>Running in simulation mode — raise your hand for data overlay.</span>
  </div>

  <!-- ============================================ -->
  <!-- SANDRO: BOTTONE START SULLO SCHERMO           -->
  <!-- ============================================ -->
  <div id="start-screen">
    <div class="start-logo">ONDULKART</div>
    <div class="start-subtitle">AR Tunnel Experience</div>
    <button id="start-btn" class="start-button">
      <span class="start-btn-text">START</span>
      <span class="start-btn-ring"></span>
    </button>
    <div class="start-hint">Tocca per avviare l'esperienza AR</div>
  </div>

  <!-- SCRIPTS -->
  <script type="module" src="js/app.js"></script>

</body>
</html>
